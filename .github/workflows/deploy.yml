name: Deploy Node.js Backend to VPS

on:
  push:
    branches:
      - main # Chạy luồng này mỗi khi có code mới đẩy lên nhánh main

jobs:
  # ==========================================
  # GIAI ĐOẠN 1: CI (Continuous Integration)
  # ==========================================
  ci-build:
    name: 🏗️ Kiểm tra Code (CI)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Lấy mã nguồn từ GitHub
        uses: actions/checkout@v4
      
      - name: 🟢 Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📦 Cài đặt pnpm
        run: npm install -g pnpm
          
      - name: 🧱 Cài đặt thư viện
        run: pnpm install --no-frozen-lockfile
        
      - name: 🔎 Kiểm tra lỗi (Build Test)
        run: pnpm run build

  # ==========================================
  # GIAI ĐOẠN 2: CD (Continuous Deployment)
  # ==========================================
  cd-deploy:
    name: 🚀 Giao hàng lên VPS (CD)
    needs: ci-build # ĐIỀU KIỆN TIÊN QUYẾT: CI phải xanh
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔐 Kết nối SSH và chạy lệnh Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            cd ~/backend
            git pull origin main
            pnpm install
            pnpm run build
            pm2 restart cosmetic-backend
