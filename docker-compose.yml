version: '3.8'

services:
  # ==========================================
  # CỤM 1: BACKEND API
  # ==========================================
  cosmetic-backend:
    container_name: cosmetic-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped
    
